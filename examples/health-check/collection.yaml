schema_version: 1
name: Health Check

vars:
  base_url: "https://jsonplaceholder.typicode.com"

requests:
  - name: health
    method: GET
    url: "{{base_url}}/posts/1"
    headers:
      Accept: "application/json"
    assert:
      status: 200
      max_ms: 3000
      jsonpath:
        "$.id":
          exists: true
